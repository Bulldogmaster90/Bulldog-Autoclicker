<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 280px;
      padding: 15px;
      font-family: Arial, sans-serif;
      text-align: center;
    }
    h2 {
      font-size: 18px;
      margin-top: 0;
    }
    label {
      display: block;
      margin: 10px 0 5px;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 5px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 8px;
      margin: 8px 0;
      cursor: pointer;
      font-weight: bold;
      border: none;
      border-radius: 4px;
    }
    #startBtn {
      background-color: #4CAF50;
      color: white;
    }
    #stopBtn {
      background-color: #f44336;
      color: white;
    }
    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #555;
    }
    .note {
      font-size: 10px;
      color: #888;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h2>Auto Clicker</h2>
  <label for="interval">Intervalo (ms):</label>
  <input type="number" id="interval" value="10" step="1" min="1">
  
  <label for="multiplier">Multiplicador (cliques por vez):</label>
  <input type="number" id="multiplier" value="1" step="1" min="1" max="100">
  
  <button id="startBtn">Iniciar</button>
  <button id="stopBtn">Parar</button>
  <div id="status">Parado</div>
  <div class="note">Passe o mouse sobre o botão #bigCookie para começar a clicar. Cada ciclo executa N cliques no botão.</div>

  <script src="popup.js"></script>
</body>
</html>
